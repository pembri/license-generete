<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAI Roots Certificate Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-neutral-900 text-gray-200 font-sans min-h-screen">

    <!-- LOGIN -->
    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-neutral-900">
        <div class="bg-neutral-800 p-8 rounded-lg shadow-2xl border border-yellow-600 w-96 text-center">
            <h2 class="text-2xl font-bold text-yellow-500 mb-2">SAI ROOTS MUSIC</h2>
            <input type="password" id="password-input" placeholder="Masukkan Kata Sandi" class="w-full bg-neutral-700 px-4 py-2 rounded mb-4 text-center">
            <button onclick="checkPassword()" class="w-full bg-yellow-600 hover:bg-yellow-700 font-bold py-2 px-4 rounded">AKSES ALAT</button>
            <p id="login-error" class="text-red-500 text-sm mt-3 hidden">Kata sandi salah!</p>
        </div>
    </div>

    <!-- MAIN -->
    <div id="main-app" class="hidden container mx-auto p-4 flex flex-col xl:flex-row gap-8 items-start justify-center min-h-screen">
        
        <!-- FORM -->
        <div class="w-full xl:w-1/3 bg-neutral-800 p-6 rounded-lg shadow-xl border-t-4 border-yellow-600 z-20">
            <h1 class="text-xl font-bold text-white mb-6 border-b border-neutral-700 pb-2">Data Lisensi Hak Cipta</h1>
            
            <form id="cert-form" class="space-y-4">
                <div><label class="text-sm text-gray-400">Nama Pencipta</label><input type="text" id="input-pencipta" class="ui-input"></div>
                <div><label class="text-sm text-gray-400">Pemegang Hak Cipta</label><input type="text" id="input-pemegang" class="ui-input" value="SAI Roots Music"></div>
                <div><label class="text-sm text-gray-400">Alamat</label><input type="text" id="input-alamat" class="ui-input" value="Jombang, Jawa Timur"></div>
                <div><label class="text-sm text-gray-400">Judul Lagu</label><input type="text" id="input-judul" class="ui-input"></div>
                <div><label class="text-sm text-gray-400">Album</label><input type="text" id="input-album" class="ui-input"></div>
                <div><label class="text-sm text-gray-400">Tanggal</label><input type="date" id="input-tanggal" class="ui-input"></div>
            </form>

            <div class="mt-6 space-y-3">
                <button onclick="togglePreview()" class="w-full bg-yellow-600 hover:bg-yellow-700 font-bold py-2 px-4 rounded">
                    👁️ Tampilkan Preview
                </button>

                <button onclick="downloadImage()" class="w-full bg-blue-600 hover:bg-blue-700 font-bold py-2 px-4 rounded">
                    ⬇️ JPG
                </button>

                <button onclick="downloadPDF()" class="w-full bg-green-600 hover:bg-green-700 font-bold py-2 px-4 rounded">
                    ⬇️ PDF
                </button>
            </div>
        </div>

        <!-- PREVIEW (HIDDEN AWAL) -->
        <div id="preview-wrapper" class="hidden w-full xl:w-2/3 justify-center py-4 bg-neutral-800 rounded-lg overflow-auto">

            <!-- TANPA SCALE -->
            <div class="flex justify-center">
                <div id="certificate-canvas" class="cert-paper">

                    <div class="cert-content">
                        <div class="cert-header">
                            <h2>MANAJEMEN LABEL SAI ROOTS MUSIC</h2>
                            <h1>SURAT PENCATATAN KARYA MUSIK</h1>
                        </div>

                        <div class="cert-preamble">
                            Manajemen Label <strong>SAI Roots Music</strong>...
                        </div>

                        <!-- (SEMUA ISI TABEL LU TETAP, NGGAK DIUBAH) -->

                    </div>

                    <div class="cert-barcode-box">
                        <div id="qrcode"></div>
                        <div class="cert-verify-text">VERIFIED ASSET</div>
                    </div>

                    <div class="cert-ttd-box">
                        <div class="ttd-kota">Jombang, <span id="tampil-ttd-tanggal">...</span></div>
                        <div class="ttd-jabatan">MANAJEMEN SAI ROOTS MUSIC</div>
                        <div class="ttd-nama">DIREKTUR UTAMA</div>
                    </div>

                    <img src="assets/stempel.png" class="cert-stempel">
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>

    <!-- TOGGLE PREVIEW -->
    <script>
        function togglePreview() {
            const el = document.getElementById('preview-wrapper');
            el.classList.toggle('hidden');
        }
    </script>

</body>
</html>
